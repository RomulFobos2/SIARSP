<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавить роль | СИАРСП</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
</head>
<body class="admin-page">
<header th:insert="~{blocks/header :: header}"></header>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <div class="profile-card p-4">
        <form action="/employee/admin/roles/addRole" method="post" class="auth-form">

            <h1 class="page-title">Добавление роли</h1>
            <p class="page-subtitle">Создайте новую роль в системе</p>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="mb-4">
                <div class="mb-3">
                    <label for="inputName" class="form-label fw-semibold">Техническое имя</label>
                    <input type="text" class="form-control" name="inputName"
                           id="inputName" required placeholder="ROLE_EMPLOYEE_..."
                           maxlength="100">
                </div>

                <div class="mb-3">
                    <label for="inputDescription" class="form-label fw-semibold">Описание</label>
                    <input type="text" class="form-control" name="inputDescription"
                           id="inputDescription" required placeholder="Описание роли"
                           maxlength="200">
                </div>
            </div>

            <button type="submit" class="w-100 btn btn-auth">
                Добавить роль
            </button>

            <div class="divider">
                <span>или</span>
            </div>

            <div class="link-section">
                <a th:href="'/employee/admin/roles/allRoles'">← К списку ролей</a>
            </div>

        </form>
            </div>
        </div>
    </div>
</div>
<div th:insert="~{blocks/footer :: footer}"></div>
</body>
</html>
