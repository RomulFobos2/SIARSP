<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создание поставки | СИАРСП</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        #productsContainer .product-row {
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #f8f9fa;
        }

        #productsContainer .product-row .available-hint {
            display: block;
            margin-top: 0.25rem;
            white-space: nowrap;
            font-size: 0.85em;
        }
    </style>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<header th:insert="~{blocks/header :: header}"></header>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <div class="profile-card p-4">

                <h1 class="page-title">Создание поставки</h1>
                <p class="page-subtitle">Оформление новой поставки клиенту</p>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form id="orderForm" method="post" action="/employee/accounter/clientOrders/createClientOrder" enctype="multipart/form-data">

                    <!-- Клиент -->
                    <div class="mb-4">
                        <h6 class="form-section-title">Клиент</h6>
                        <select id="clientId" name="clientId" class="form-select" required>
                            <option value="">-- Выберите клиента --</option>
                            <option th:each="client : ${clients}"
                                    th:value="${client.id}"
                                    th:text="${client.getDisplayName()}"></option>
                        </select>
                    </div>

                    <!-- Дата доставки и комментарий -->
                    <div class="mb-4">
                        <h6 class="form-section-title">Параметры заказа</h6>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="deliveryDate" class="form-label">Дата доставки *</label>
                                <input type="date" id="deliveryDate" name="deliveryDate"
                                       class="form-control" required>
                            </div>
                            <div class="col-md-8">
                                <label for="comment" class="form-label">Комментарий</label>
                                <textarea id="comment" name="comment" class="form-control"
                                          maxlength="500" rows="2" placeholder="Примечания к заказу"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Контракт -->
                    <div class="mb-4">
                        <h6 class="form-section-title">Контракт</h6>
                        <div class="col-md-6">
                            <label for="contractFile" class="form-label">Файл контракта (PDF, DOC, DOCX) <span class="text-danger">*</span></label>
                            <input type="file" id="contractFile" name="contractFile"
                                   class="form-control" accept=".pdf,.doc,.docx" required>
                        </div>
                    </div>

                    <!-- Позиции заказа -->
                    <div class="mb-4">
                        <h6 class="form-section-title">Позиции поставки</h6>
                        <div id="productsContainer">
                            <!-- Динамические строки добавляются JS -->
                        </div>
                        <input type="file" id="importDocxInput" accept=".docx" style="display:none;" onchange="handleImportFile()"/>
                        <button type="button" id="addProductBtn" class="btn btn-outline-primary mt-2"
                                onclick="addProductRow()">
                            + Добавить товар
                        </button>
                        <button type="button" class="btn btn-outline-secondary mt-2 ms-2"
                                onclick="document.getElementById('importDocxInput').click()">
                            📥 Импорт из docx
                        </button>
                    </div>

                    <!-- Итого -->
                    <div class="mb-4 p-3 bg-light rounded">
                        <h5 class="mb-0">Итого: <span id="grandTotal" class="fw-bold">0.00</span> руб.</h5>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary btn-profile">Создать поставку</button>
                    </div>

                    <div class="divider"><span>или</span></div>
                    <div class="link-section">
                        <a href="/employee/accounter/clientOrders/allClientOrders">&larr; К списку поставок</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:insert="~{blocks/footer :: footer}"></div>

<script th:inline="javascript">
    var productsData = /*[[${productsList}]]*/ [];
</script>
<script>
    var rowIndex = 0;

    document.addEventListener('DOMContentLoaded', function() {
        var tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        var dateStr = tomorrow.toISOString().split('T')[0];
        document.getElementById('deliveryDate').setAttribute('min', dateStr);

        addProductRow();
    });

    function addProductRow() {
        rowIndex++;
        var container = document.getElementById('productsContainer');
        var row = document.createElement('div');
        row.className = 'product-row';
        row.setAttribute('data-row-index', rowIndex);
        row.innerHTML =
            '<div class="row g-2 mb-2 align-items-start">' +
                '<div class="col-md-8">' +
                    '<label class="form-label">Товар *</label>' +
                    '<select name="productId" class="form-select product-select" required onchange="onProductChange(this)">' +
                        '<option value="">-- Выберите --</option>' +
                        buildProductOptions() +
                    '</select>' +
                '</div>' +
                '<div class="col-md-2 quantity-col">' +
                    '<label class="form-label">Кол-во *</label>' +
                    '<input type="number" name="quantity" class="form-control quantity-input" min="1" required oninput="calculateRowTotal(this)">' +
                    '<small class="text-muted available-hint"></small>' +
                '</div>' +
                '<div class="col-md-2">' +
                    '<label class="form-label d-block">&nbsp;</label>' +
                    '<button type="button" class="btn btn-outline-danger btn-sm w-100" onclick="removeProductRow(this)">Удалить</button>' +
                '</div>' +
            '</div>' +
            '<div class="row g-2 align-items-end">' +
                '<div class="col-md-3">' +
                    '<label class="form-label">Цена без скидки *</label>' +
                    '<input type="number" name="originalPrice" class="form-control original-price-input" min="0.01" step="0.01" required oninput="calculateDiscountedPrice(this)">' +
                '</div>' +
                '<div class="col-md-2" style="display:none;">' +
                    '<label class="form-label">Наценка %</label>' +
                    '<input type="number" name="markupPercent" class="form-control markup-input" min="0" max="999" value="0" oninput="calculateDiscountedPrice(this)">' +
                '</div>' +
                '<div class="col-md-2">' +
                    '<label class="form-label">Скидка %</label>' +
                    '<input type="number" name="discountPercent" class="form-control discount-input" min="0" max="100" value="0" oninput="calculateDiscountedPrice(this)">' +
                '</div>' +
                '<div class="col-md-2">' +
                    '<label class="form-label">Итог. цена</label>' +
                    '<input type="number" name="price" class="form-control price-input" step="0.01" readonly required>' +
                '</div>' +
                '<div class="col-md-3">' +
                    '<label class="form-label">Сумма</label>' +
                    '<input type="text" class="form-control row-total" readonly value="0.00">' +
                '</div>' +
            '</div>';
        container.appendChild(row);
        updateSelectOptions();
    }

    function buildProductOptions() {
        var html = '';
        for (var i = 0; i < productsData.length; i++) {
            var p = productsData[i];
            var avgDel = p.avgDeliveryDays ? Math.round(p.avgDeliveryDays) : 0;
            html += '<option value="' + p.id + '" data-available="' + p.availableQuantity
                + '" data-stock="' + p.stockQuantity
                + '" data-avg-delivery="' + avgDel + '">'
                + p.name + ' (' + p.article + ') — на складе: ' + p.stockQuantity + ' шт.'
                + '</option>';
        }
        return html;
    }

    function onProductChange(select) {
        var allSelects = document.querySelectorAll('.product-select');
        for (var i = 0; i < allSelects.length; i++) {
            if (allSelects[i] !== select && allSelects[i].value === select.value && select.value) {
                alert('Этот товар уже добавлен в заказ.');
                select.value = '';

                var row = select.closest('.product-row');
                var qtyInput = row.querySelector('.quantity-input');
                var hint = row.querySelector('.available-hint');

                qtyInput.value = '';
                hint.textContent = '';

                row.querySelector('.original-price-input').value = '';
                row.querySelector('.discount-input').value = '0';
                row.querySelector('.price-input').value = '';
                row.querySelector('.row-total').value = '0.00';
                updateGrandTotal();

                updateSelectOptions();
                return;
            }
        }

        var row = select.closest('.product-row');
        if (!row) {
            updateSelectOptions();
            return;
        }
        var qtyInput = row.querySelector('.quantity-input');
        var selectedOption = select.options[select.selectedIndex];
        var hint = row.querySelector('.available-hint');
        if (!selectedOption || !qtyInput || !hint) {
            updateSelectOptions();
            return;
        }

        if (selectedOption.value) {
            var available = parseInt(selectedOption.getAttribute('data-available'), 10);
            hint.textContent = 'Доступно: ' + available + ' шт.';
            hint.className = 'text-muted available-hint';
            updateDeficitHint(row);
        } else {
            hint.textContent = '';
            hint.className = 'text-muted available-hint';
        }

        updateSelectOptions();
    }

    function updateDeficitHint(row) {
        var select = row.querySelector('.product-select');
        var selectedOption = select.options[select.selectedIndex];
        var qtyInput = row.querySelector('.quantity-input');
        var hint = row.querySelector('.available-hint');

        if (!selectedOption || !selectedOption.value) {
            hint.textContent = '';
            hint.className = 'text-muted available-hint';
            return;
        }

        var available = parseInt(selectedOption.getAttribute('data-available'));
        var qty = parseInt(qtyInput.value) || 0;

        if (qty > available) {
            var deficit = qty - available;
            var avgDays = parseInt(selectedOption.getAttribute('data-avg-delivery')) || 0;
            var text = 'Дефицит: ' + deficit + ' шт.';
            if (avgDays > 0) {
                text += ' | Среднее время поставки: ' + avgDays + ' дн.';
            }
            hint.textContent = text;
            hint.className = 'text-warning available-hint';
        } else {
            hint.textContent = 'Доступно: ' + available + ' шт.';
            hint.className = 'text-muted available-hint';
        }
    }

    function updateSelectOptions() {
        var allSelects = document.querySelectorAll('.product-select');
        var selectedValues = [];
        for (var i = 0; i < allSelects.length; i++) {
            if (allSelects[i].value) selectedValues.push(allSelects[i].value);
        }
        for (var i = 0; i < allSelects.length; i++) {
            var currentVal = allSelects[i].value;
            var options = allSelects[i].querySelectorAll('option');
            for (var j = 0; j < options.length; j++) {
                if (!options[j].value) continue;
                options[j].disabled = (options[j].value !== currentVal && selectedValues.indexOf(options[j].value) !== -1);
            }
        }
    }

    function calculateDiscountedPrice(input) {
        var row = input.closest('.product-row');
        var originalPrice = parseFloat(row.querySelector('.original-price-input').value) || 0;
        var markup = parseFloat(row.querySelector('.markup-input').value) || 0;
        var discount = parseFloat(row.querySelector('.discount-input').value) || 0;
        if (markup < 0) markup = 0;
        if (discount < 0) discount = 0;
        if (discount > 100) discount = 100;
        var withMarkup = originalPrice * (1 + markup / 100);
        var finalPrice = withMarkup * (1 - discount / 100);
        row.querySelector('.price-input').value = finalPrice.toFixed(2);
        calculateRowTotal(row.querySelector('.price-input'));
    }

    function calculateRowTotal(input) {
        var row = input.closest('.product-row');
        var qty = parseFloat(row.querySelector('.quantity-input').value) || 0;
        var price = parseFloat(row.querySelector('.price-input').value) || 0;
        var total = (qty * price).toFixed(2);
        row.querySelector('.row-total').value = total;
        updateGrandTotal();
        updateDeficitHint(row);
    }

    function updateGrandTotal() {
        var totals = document.querySelectorAll('.row-total');
        var sum = 0;
        for (var i = 0; i < totals.length; i++) {
            sum += parseFloat(totals[i].value) || 0;
        }
        document.getElementById('grandTotal').textContent = sum.toFixed(2);
    }

    function removeProductRow(btn) {
        var row = btn.closest('.product-row');
        row.remove();
        updateGrandTotal();
        updateSelectOptions();
    }

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        var rows = document.querySelectorAll('.product-row');
        if (rows.length === 0) {
            e.preventDefault();
            alert('Добавьте хотя бы один товар в заказ.');
            return;
        }

        var selects = document.querySelectorAll('.product-select');
        var selectedIds = [];
        for (var i = 0; i < selects.length; i++) {
            if (!selects[i].value) {
                e.preventDefault();
                alert('Выберите товар во всех позициях.');
                return;
            }
            if (selectedIds.indexOf(selects[i].value) !== -1) {
                e.preventDefault();
                alert('Один и тот же товар не может быть добавлен дважды.');
                return;
            }
            selectedIds.push(selects[i].value);
        }
    });
</script>
<div class="modal fade" id="importResultModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Импорт коммерческого предложения</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>
      <div class="modal-body" id="importResultBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="button" class="btn btn-primary" id="confirmImportBtn" onclick="applyImportedRows()">Добавить позиции</button>
      </div>
    </div>
  </div>
</div>

<script>
    window._lastImport = null;

    function handleImportFile() {
        var fileInput = document.getElementById('importDocxInput');
        if (!fileInput.files || fileInput.files.length === 0) return;
        var formData = new FormData();
        formData.append('file', fileInput.files[0]);

        var modal = new bootstrap.Modal(document.getElementById('importResultModal'));
        var body = document.getElementById('importResultBody');
        body.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
        document.getElementById('confirmImportBtn').disabled = true;
        modal.show();

        fetch('/employee/accounter/clientOrders/importProducts', { method: 'POST', body: formData })
            .then(function(r) { return r.json(); })
            .then(function(resp) {
                if (!resp.success) {
                    body.innerHTML = '<div class="alert alert-danger mb-0">' +
                        (resp.message || 'Не удалось разобрать файл.') + '</div>';
                    fileInput.value = '';
                    return;
                }
                window._lastImport = resp.data;
                renderImportPreview(resp.data);
            })
            .catch(function() {
                body.innerHTML = '<div class="alert alert-danger mb-0">Ошибка сети при импорте.</div>';
                fileInput.value = '';
            });
    }

    function renderImportPreview(data) {
        var body = document.getElementById('importResultBody');
        var rows = '';
        for (var i = 0; i < data.items.length; i++) {
            var it = data.items[i];
            var rowCls = it.status === 'FOUND' ? 'table-success' : 'table-warning';
            var name = it.status === 'FOUND' ? it.productNameInSystem : (it.productNameInFile || '—');
            var statusTxt = it.status === 'FOUND' ? '✅ найден' : '⚠️ не найден';
            rows +=
                '<tr class="' + rowCls + '">' +
                    '<td>' + (i + 1) + '</td>' +
                    '<td><strong>' + escapeHtml(it.article) + '</strong></td>' +
                    '<td>' + escapeHtml(name) + '</td>' +
                    '<td class="text-center">' + it.quantity + '</td>' +
                    '<td class="text-center">' + it.discountPercent + '%</td>' +
                    '<td class="text-end">' + Number(it.priceAfterDiscount).toFixed(2) + ' ₽</td>' +
                    '<td>' + statusTxt + '</td>' +
                '</tr>';
        }
        var summary =
            '<div class="alert alert-light border mb-3">' +
                '<div>Распознано позиций: <strong>' + data.foundCount + '</strong></div>' +
                (data.notFoundCount > 0 ? '<div class="text-warning">Не найдено в системе: <strong>' + data.notFoundCount + '</strong> (будут пропущены)</div>' : '') +
                (data.duplicatesMerged > 0 ? '<div class="text-muted">Дубли в файле объединены: <strong>' + data.duplicatesMerged + '</strong></div>' : '') +
            '</div>';
        body.innerHTML = summary +
            '<div class="table-responsive"><table class="table table-sm table-bordered align-middle">' +
                '<thead><tr><th>#</th><th>Артикул</th><th>Наименование</th>' +
                '<th>Кол-во</th><th>Скидка</th><th>Цена с НДС</th><th>Статус</th></tr></thead>' +
                '<tbody>' + rows + '</tbody></table></div>';
        document.getElementById('confirmImportBtn').disabled = (data.foundCount === 0);
    }

    function applyImportedRows() {
        var data = window._lastImport;
        if (!data) return;
        for (var i = 0; i < data.items.length; i++) {
            var it = data.items[i];
            if (it.status !== 'FOUND') continue;
            addProductRow();
            var rows = document.querySelectorAll('.product-row');
            var row = rows[rows.length - 1];
            var sel = row.querySelector('.product-select');
            sel.value = String(it.productId);
            onProductChange(sel);
            row.querySelector('.quantity-input').value = it.quantity;
            row.querySelector('.original-price-input').value = Number(it.originalPrice).toFixed(2);
            row.querySelector('.discount-input').value = it.discountPercent;
            calculateDiscountedPrice(row.querySelector('.original-price-input'));
        }
        var modalEl = document.getElementById('importResultModal');
        bootstrap.Modal.getInstance(modalEl).hide();
        document.getElementById('importDocxInput').value = '';
        window._lastImport = null;
    }

    function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
</script>

</body>
</html>
