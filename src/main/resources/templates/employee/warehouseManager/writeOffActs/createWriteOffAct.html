<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создание акта списания | СИАРСП</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
</head>
<body class="admin-page">
<header th:insert="~{blocks/header :: header}"></header>

<div class="container my-5">
    <div class="profile-card mb-4">
        <div class="profile-actions">
            <a href="/employee/warehouseManager/writeOffActs/allWriteOffActs"
               class="btn btn-secondary btn-profile">← Назад к актам</a>
        </div>
    </div>

    <div class="profile-card p-4">
        <h2 class="h3 mb-4 fw-bold">
            <i class="bi bi-file-earmark-minus me-2"></i>Создание акта списания
        </h2>

        <form method="post" action="/employee/warehouseManager/writeOffActs/createWriteOffAct">
            <!-- Выбор товара -->
            <div class="mb-3">
                <label for="productId" class="form-label fw-semibold">Товар <span class="text-danger">*</span></label>
                <select id="productId" name="productId" class="form-select" required onchange="onProductChange()">
                    <option value="">— Выберите товар —</option>
                    <option th:each="product : ${products}"
                            th:value="${product.id}"
                            th:text="${product.name + ' (' + product.article + ')'}">
                    </option>
                </select>
            </div>

            <!-- Выбор склада -->
            <div class="mb-3">
                <label for="warehouseId" class="form-label fw-semibold">Склад списания <span class="text-danger">*</span></label>
                <select id="warehouseId" name="warehouseId" class="form-select" required disabled onchange="onWarehouseChange()">
                    <option value="">— Сначала выберите товар —</option>
                </select>
                <div class="form-text" id="warehouseHint"></div>
            </div>

            <!-- Выбор партии -->
            <div class="mb-3">
                <label for="supplyId" class="form-label fw-semibold">Партия <span class="text-danger">*</span></label>
                <select id="supplyId" name="supplyId" class="form-select" required disabled onchange="onSupplyChange()">
                    <option value="">— Сначала выберите склад —</option>
                </select>
                <div class="form-text" id="supplyHint"></div>
            </div>

            <!-- Выбор зоны -->
            <div class="mb-3">
                <label for="zoneId" class="form-label fw-semibold">Зона хранения <span class="text-danger">*</span></label>
                <select id="zoneId" name="zoneId" class="form-select" required disabled onchange="onZoneChange()">
                    <option value="">— Сначала выберите партию —</option>
                </select>
                <div class="form-text" id="zoneHint"></div>
            </div>

            <!-- Количество -->
            <div class="mb-3">
                <label for="quantity" class="form-label fw-semibold">Количество <span class="text-danger">*</span></label>
                <input type="number" id="quantity" name="quantity" class="form-control"
                       min="1" required disabled placeholder="Сначала выберите партию и зону">
                <div class="form-text" id="quantityHint">Выберите партию и зону для отображения доступного количества</div>
            </div>

            <!-- Причина -->
            <div class="mb-3">
                <label for="reason" class="form-label fw-semibold">Причина списания <span class="text-danger">*</span></label>
                <select id="reason" name="reason" class="form-select" required>
                    <option value="">— Выберите причину —</option>
                    <option th:each="r : ${reasons}" th:value="${r.name()}" th:text="${r.displayName}"></option>
                </select>
            </div>

            <!-- Комментарий -->
            <div class="mb-4">
                <label for="comment" class="form-label fw-semibold">Комментарий</label>
                <textarea id="comment" name="comment" class="form-control" rows="3" maxlength="500"
                          placeholder="Подробное описание обстоятельств списания..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send me-1"></i> Отправить на подпись
                </button>
                <a href="/employee/warehouseManager/writeOffActs/allWriteOffActs"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>

<div th:insert="~{blocks/footer :: footer}"></div>

<script>
    function resetFrom(level) {
        // level: 'warehouse' | 'supply' | 'zone' | 'quantity'
        var supplySelect = document.getElementById('supplyId');
        var zoneSelect = document.getElementById('zoneId');
        var quantityInput = document.getElementById('quantity');
        if (level === 'warehouse') {
            supplySelect.innerHTML = '<option value="">— Сначала выберите склад —</option>';
            supplySelect.disabled = true;
            document.getElementById('supplyHint').textContent = '';
        }
        if (level === 'warehouse' || level === 'supply') {
            zoneSelect.innerHTML = '<option value="">— Сначала выберите партию —</option>';
            zoneSelect.disabled = true;
            document.getElementById('zoneHint').textContent = '';
        }
        quantityInput.value = '';
        quantityInput.removeAttribute('max');
        quantityInput.disabled = true;
        quantityInput.placeholder = 'Сначала выберите партию и зону';
        document.getElementById('quantityHint').textContent =
                'Выберите партию и зону для отображения доступного количества';
    }

    function onProductChange() {
        var productId = document.getElementById('productId').value;
        var warehouseSelect = document.getElementById('warehouseId');
        var warehouseHint = document.getElementById('warehouseHint');

        warehouseSelect.innerHTML = '<option value="">— Выберите склад —</option>';
        warehouseSelect.disabled = true;
        warehouseHint.textContent = '';
        resetFrom('warehouse');

        if (!productId) return;

        warehouseHint.textContent = 'Загрузка складов...';
        fetch('/employee/warehouseManager/writeOffActs/warehouses-by-product/' + productId)
            .then(function(r) { return r.json(); })
            .then(function(warehouses) {
                warehouseHint.textContent = '';
                if (warehouses.length === 0) {
                    warehouseSelect.innerHTML = '<option value="">— Товар не размещён на складах —</option>';
                    return;
                }
                warehouseSelect.innerHTML = '<option value="">— Выберите склад —</option>';
                var anyAvailable = false;
                warehouses.forEach(function(wh) {
                    var opt = document.createElement('option');
                    opt.value = wh.id;
                    opt.textContent = wh.name + ' (доступно: ' + wh.availableQuantity
                            + ' из ' + wh.placedOnWarehouse + ' шт.)';
                    if (wh.availableQuantity <= 0) {
                        opt.disabled = true;
                    } else {
                        anyAvailable = true;
                    }
                    warehouseSelect.appendChild(opt);
                });
                if (!anyAvailable) {
                    warehouseHint.textContent = 'Весь размещённый товар зарезервирован под клиентские заказы. '
                            + 'Сначала отмените или отгрузите соответствующий заказ.';
                }
                warehouseSelect.disabled = false;
            })
            .catch(function() {
                warehouseHint.textContent = 'Ошибка загрузки складов';
            });
    }

    function onWarehouseChange() {
        var productId = document.getElementById('productId').value;
        var warehouseId = document.getElementById('warehouseId').value;
        var supplySelect = document.getElementById('supplyId');
        var supplyHint = document.getElementById('supplyHint');

        resetFrom('warehouse');
        if (!warehouseId) return;

        supplySelect.innerHTML = '<option value="">— Загрузка партий... —</option>';
        supplyHint.textContent = '';

        fetch('/employee/warehouseManager/writeOffActs/product-supplies-in-warehouse/'
                + productId + '/' + warehouseId)
            .then(function(r) { return r.json(); })
            .then(function(supplies) {
                if (!supplies || supplies.length === 0) {
                    supplySelect.innerHTML = '<option value="">— Нет партий с остатком на складе —</option>';
                    supplySelect.disabled = true;
                    return;
                }
                supplySelect.innerHTML = '<option value="">— Выберите партию —</option>';
                supplies.forEach(function(s) {
                    var opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = 'Пр-во: ' + (s.productionDate || '—')
                            + ' / Годен до: ' + (s.expirationDate || '—')
                            + ' (на складе: ' + s.quantityInWarehouse + ' шт.)';
                    supplySelect.appendChild(opt);
                });
                supplySelect.disabled = false;
            })
            .catch(function() {
                supplyHint.textContent = 'Ошибка загрузки партий';
            });
    }

    function onSupplyChange() {
        var supplyId = document.getElementById('supplyId').value;
        var warehouseId = document.getElementById('warehouseId').value;
        var zoneSelect = document.getElementById('zoneId');
        var zoneHint = document.getElementById('zoneHint');

        resetFrom('supply');
        if (!supplyId) return;

        zoneSelect.innerHTML = '<option value="">— Загрузка зон... —</option>';
        zoneHint.textContent = '';

        fetch('/employee/warehouseManager/writeOffActs/supply-zones-in-warehouse/'
                + supplyId + '/' + warehouseId)
            .then(function(r) { return r.json(); })
            .then(function(zones) {
                if (!zones || zones.length === 0) {
                    zoneSelect.innerHTML = '<option value="">— Нет зон —</option>';
                    zoneSelect.disabled = true;
                    return;
                }
                zoneSelect.innerHTML = '<option value="">— Выберите зону —</option>';
                zones.forEach(function(z) {
                    var opt = document.createElement('option');
                    opt.value = z.zoneId;
                    opt.textContent = 'Полка ' + z.shelfCode + ' / Зона ' + z.label
                            + ' (' + z.quantity + ' шт.)';
                    opt.dataset.qty = z.quantity;
                    zoneSelect.appendChild(opt);
                });
                zoneSelect.disabled = false;
            })
            .catch(function() {
                zoneHint.textContent = 'Ошибка загрузки зон';
            });
    }

    function onZoneChange() {
        var zoneSelect = document.getElementById('zoneId');
        var selected = zoneSelect.options[zoneSelect.selectedIndex];
        var quantityInput = document.getElementById('quantity');
        var quantityHint = document.getElementById('quantityHint');

        quantityInput.value = '';
        if (selected && selected.dataset.qty) {
            var available = parseInt(selected.dataset.qty);
            quantityInput.max = available;
            quantityInput.disabled = false;
            quantityInput.placeholder = 'Укажите количество для списания';
            quantityHint.textContent = 'Доступно в выбранной зоне (партия + зона): ' + available + ' шт.';
        } else {
            quantityInput.removeAttribute('max');
            quantityInput.disabled = true;
            quantityInput.placeholder = 'Сначала выберите партию и зону';
            quantityHint.textContent = 'Выберите зону для отображения доступного количества';
        }
    }
</script>
</body>
</html>
