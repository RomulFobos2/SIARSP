<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ========== Фрагмент: модальное окно с Яндекс Картой для выбора координат ========== -->
<div th:fragment="mapPicker">
    <link href="/css/map-picker.css" rel="stylesheet">

    <!-- Модальное окно -->
    <div class="modal fade" id="mapPickerModal" tabindex="-1" aria-labelledby="mapPickerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="mapPickerModalLabel">Выберите точку на карте</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <div id="mapPickerContainer"></div>
                    <div class="mt-3 d-flex justify-content-between align-items-center">
                        <div>
                            <div id="mapPickerCoords" class="text-muted">Кликните на карту для выбора точки</div>
                            <div id="mapPickerAddress" class="text-muted mt-1"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="mapPickerConfirmBtn" disabled>
                        <i class="bi bi-check-lg"></i> Подтвердить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Яндекс Карты API v2.1 -->
    <!-- TODO: Вставьте свой API-ключ Яндекс Карт (https://developer.tech.yandex.ru/) -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <!-- Логика выбора координат на карте -->
    <script src="/js/map-picker.js"></script>
</div>

</html>
